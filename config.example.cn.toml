# DeepCoBot 配置示例文件（中文版）
# 复制此文件到 ~/.deepcobot/config.toml 并根据需要修改

# ==================== Agent 默认配置 ====================
[agent]
# 工作空间目录，Agent 的所有文件操作都在此目录下进行
workspace = "~/.deepcobot/workspace"

# LLM 模型配置，格式: <提供商>:<模型名称>
# 支持的提供商: anthropic, openai 或自定义提供商名称
model = "anthropic:claude-sonnet-4-6"

# 最大输出 token 数
max_tokens = 8192

# 最大递归深度（防止无限循环）
# 默认: 50，复杂多步骤任务可适当增加
recursion_limit = 50

# 系统提示词（可选，默认自动生成）
# system_prompt = """你是一个有用的 AI 助手..."""

# 是否启用记忆系统
enable_memory = true

# 是否启用技能系统
# 内置技能（core/cron, core/weather, office/pdf, office/xlsx 等）会自动加载
# 用户技能可添加到 ~/.deepcobot/workspace/skills/<技能名>/SKILL.md
enable_skills = true

# 是否启用手动压缩对话工具
enable_compact_tool = true

# 是否自动审批工具调用（设为 false 时需要手动审批敏感操作）
# 需要审批的工具: execute, write_file, edit_file, web_search, task
auto_approve = false

# Bot 模式下是否显示工具执行进度（Telegram、Discord、飞书、钉钉等渠道）
# 启用后用户可以看到中间步骤，如 "⏳ 执行命令..."、"⏳ 读取文件..."
# 注意：根据渠道不同可能会产生多条消息
# show_progress = false

# ==================== LLM 提供商配置 ====================
# DeepCoBot 支持任何 OpenAI 兼容的 API，请在下方配置你的提供商

# Anthropic 配置
[providers.anthropic]
api_key = "${ANTHROPIC_API_KEY}"
# api_base = "https://api.anthropic.com"  # 可选，自定义 API 端点
# 自定义请求头（可选，用于代理或自定义授权等场景）
# headers = { "X-Custom-Header" = "custom-value" }

# OpenAI 配置
[providers.openai]
api_key = "${OPENAI_API_KEY}"
# api_base = "https://api.openai.com/v1"  # 可选，自定义 API 端点
# 自定义请求头（可选，用于代理或自定义授权等场景）
# headers = { "X-Custom-Header" = "custom-value" }

# DeepSeek 配置（OpenAI 兼容格式）
# [providers.deepseek]
# api_key = "${DEEPSEEK_API_KEY}"
# api_base = "https://api.deepseek.com/v1"

# 月之暗面 (Moonshot) 配置（OpenAI 兼容格式）
# [providers.moonshot]
# api_key = "${MOONSHOT_API_KEY}"
# api_base = "https://api.moonshot.cn/v1"

# 智谱 (Zhipu) 配置（OpenAI 兼容格式）
# [providers.zhipu]
# api_key = "${ZHIPU_API_KEY}"
# api_base = "https://open.bigmodel.cn/api/paas/v4"

# 通义千问 (Qwen) 配置（OpenAI 兼容格式）
# [providers.qwen]
# api_key = "${QWEN_API_KEY}"
# api_base = "https://dashscope.aliyuncs.com/compatible-mode/v1"

# 本地大模型通过 Ollama（OpenAI 兼容格式）
# [providers.ollama]
# api_key = "ollama"  # Ollama 不需要真实的 API 密钥
# api_base = "http://localhost:11434/v1"

# 其他 OpenAI 兼容提供商（如 Together AI, Groq, SiliconFlow 硅基流动等）
# [providers.together]
# api_key = "${TOGETHER_API_KEY}"
# api_base = "https://api.together.xyz/v1"

# ==================== Gateway 配置（可选） ====================
# 用于集中管理 API 调用，支持 LangSmith 追踪等

[gateway]
enabled = false
# url = "https://your-gateway.example.com"
# api_key = "${GATEWAY_API_KEY}"

# ==================== 消息渠道配置 ====================

# CLI 渠道（默认启用）
[channels.cli]
enabled = true

# Telegram 渠道
[channels.telegram]
enabled = false
token = "${TELEGRAM_BOT_TOKEN}"
# proxy = "http://127.0.0.1:7890"  # 可选，代理设置
allowed_users = []  # 留空允许所有用户，或填写 user_id 或 username

# Discord 渠道
[channels.discord]
enabled = false
token = "${DISCORD_BOT_TOKEN}"
allowed_users = []

# 飞书渠道
[channels.feishu]
enabled = false
app_id = "${FEISHU_APP_ID}"
app_secret = "${FEISHU_APP_SECRET}"
# encrypt_key = "${FEISHU_ENCRYPT_KEY}"  # 可选，消息加密密钥
# verification_token = "${FEISHU_VERIFICATION_TOKEN}"  # 可选
allowed_users = []

# 钉钉渠道
[channels.dingtalk]
enabled = false
client_id = "${DINGTALK_CLIENT_ID}"
client_secret = "${DINGTALK_CLIENT_SECRET}"
allowed_users = []

# AI 卡片配置（可选，用于进度反馈）
# 在钉钉开放平台创建卡片模板后启用，可实时显示 Agent 执行进度（类似 spinner）
# card_template_id = "your_card_template_id"
# card_template_key = "content"  # 卡片模板中内容字段的 key

# Web API 渠道
[channels.web]
enabled = false
host = "0.0.0.0"
port = 8080
# api_key = "${WEB_API_KEY}"  # 可选，API 认证密钥

# ==================== 异步子 Agent 配置 ====================
# 配置连接远程 LangGraph 服务器的异步子 Agent

# [[async_subagents]]
# name = "research-agent"
# description = "用于深度研究任务的异步 Agent"
# graph_id = "research_graph"
# url = "http://localhost:8123"

# [[async_subagents]]
# name = "code-review-agent"
# description = "用于代码审查的异步 Agent"
# graph_id = "code_review_graph"
# url = "http://localhost:8124"

# ==================== Cron 任务配置 ====================

[cron]
enabled = false
store_path = "~/.deepcobot/cron_jobs.json"

# 预定义任务示例
# [[cron.jobs]]
# name = "daily-report"
# enabled = true
# schedule = "0 9 * * *"  # 每天 9:00 (cron 表达式)
# message = "请生成今天的日报"
# channel = "telegram"
# chat_id = "123456789"

# [[cron.jobs]]
# name = "hourly-check"
# enabled = true
# every = "1h"  # 每小时执行
# message = "检查系统状态"

# ==================== Heartbeat 配置 ====================
# Heartbeat 定期读取 HEARTBEAT.md 并触发 Agent 执行任务
# 在 ~/.deepcobot/workspace/HEARTBEAT.md 中写入你的定期任务

[heartbeat]
# 是否启用 Heartbeat 服务
enabled = false

# 执行间隔：支持 "30m", "1h", "2h30m", "90s"
every = "30m"

# 活跃时段：仅在此时间范围内执行（可选）
# 格式: "HH:MM-HH:MM"，使用系统时区
# active_hours = "09:00-18:00"

# 结果投递目标（可选）：
# - "last": 投递到上次交互的渠道（非 CLI）
# - "channel:chat_id": 投递到指定渠道，如 "telegram:123456789"
# - 留空或不设置：不投递（静默执行）
# target = "last"

# 执行超时时间（秒）
timeout = 120

# ==================== 服务配置 ====================

[services]
# 健康检查端点
health_enabled = false
health_port = 8081

# Prometheus 指标端点
metrics_enabled = false
metrics_port = 9090

# ==================== 日志配置 ====================

[logging]
# 日志级别: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = "INFO"
# 是否输出 JSON 格式日志（适合生产环境）
json_format = false
# 日志文件路径（可选）
# file = "~/.deepcobot/deepcobot.log"

# ==================== LangSmith 配置 ====================
# 配置 LangSmith 用于追踪和调试 AI 应用

[langsmith]
# 是否启用 LangSmith 追踪
enabled = false
# LangSmith API 密钥（格式: lsv2_pt_...）
# 从 https://smith.langchain.com/settings 获取你的 API 密钥
# api_key = "${LANGSMITH_API_KEY}"
# 项目名称（可选，默认为 "default"）
# project = "my-project"

# ==================== Langfuse 配置 ====================
# 配置 Langfuse 用于追踪和调试 AI 应用
# Langfuse 是 LangSmith 的开源替代方案

[langfuse]
# 是否启用 Langfuse 追踪
enabled = false
# Langfuse 公钥（格式: pk-...）
# 从 https://cloud.langfuse.com 或自托管实例获取密钥
# public_key = "${LANGFUSE_PUBLIC_KEY}"
# Langfuse 私钥（格式: sk-...）
# secret_key = "${LANGFUSE_SECRET_KEY}"
# Langfuse 服务地址（可选，默认为 https://cloud.langfuse.com）
# 自托管时设置为: base_url = "https://langfuse.your-domain.com"
# base_url = "${LANGFUSE_BASE_URL}"
# 项目名称（可选）
# project = "my-project"

# ==================== MCP (Model Context Protocol) 配置 ====================
# 连接 MCP 服务器以扩展 Agent 能力

# 示例：本地文件系统 MCP 服务器（stdio 传输）
# [mcp.servers.filesystem]
# type = "stdio"
# command = "npx"
# args = ["-y", "@anthropic/mcp-server-filesystem", "/tmp"]
# tool_timeout = 30
# enabled_tools = ["*"]  # "*" 启用所有工具，或指定工具名列表

# 示例：远程 MCP 服务器（SSE 传输）
# [mcp.servers.remote-api]
# type = "sse"
# url = "https://api.example.com/mcp/sse"
# headers = { Authorization = "Bearer your-token" }
# tool_timeout = 60
# enabled_tools = ["search", "query"]  # 只启用特定工具

# 示例：远程 MCP 服务器（Streamable HTTP 传输）
# [mcp.servers.data-service]
# type = "streamableHttp"
# url = "https://api.example.com/mcp"
# headers = { "X-API-Key" = "your-api-key" }
# tool_timeout = 30
# enabled_tools = ["*"]