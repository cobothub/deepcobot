version: '3.8'

services:
  deepcobot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: deepcobot
    restart: unless-stopped
    ports:
      - "8080:8080"   # Web API
      - "8081:8081"   # 健康检查
      - "8123:8123"   # LangGraph Server
    volumes:
      # 配置文件
      - ./config:/home/deepcobot/.deepcobot:ro
      # 工作空间持久化
      - deepcobot-workspace:/home/deepcobot/.deepcobot/workspace
      # 技能目录
      - ./skills:/home/deepcobot/.deepcobot/skills:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DEEPCOBOT_LOG_LEVEL=${DEEPCOBOT_LOG_LEVEL:-INFO}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 可选: Prometheus 监控
  prometheus:
    image: prom/prometheus:latest
    container_name: deepcobot-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    profiles:
      - monitoring

  # 可选: Grafana 可视化
  grafana:
    image: grafana/grafana:latest
    container_name: deepcobot-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    depends_on:
      - prometheus
    profiles:
      - monitoring

volumes:
  deepcobot-workspace:
  prometheus-data:
  grafana-data: