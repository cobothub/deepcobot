# DeepCoBot Configuration Example
# Copy this file to ~/.deepcobot/config.toml and modify as needed

# ==================== Agent Default Configuration ====================
[agent]
# Workspace directory - all file operations are performed here
workspace = "~/.deepcobot/workspace"

# LLM model configuration, format: <provider>:<model_name>
# Supported providers: anthropic, openai, or custom provider names
model = "anthropic:claude-sonnet-4-6"

# Maximum output tokens
max_tokens = 8192

# Maximum recursion depth (prevents infinite loops)
# Default: 50, increase for complex multi-step tasks
recursion_limit = 50

# System prompt (optional, auto-generated by default)
# system_prompt = """You are a helpful AI assistant..."""

# Enable memory system
enable_memory = true

# Enable skills system
# Built-in skills (core/cron, core/weather, office/pdf, office/xlsx, etc.) are loaded automatically
# User skills can be added to ~/.deepcobot/workspace/skills/<skill-name>/SKILL.md
enable_skills = true

# Enable compact conversation tool for manual context compression
enable_compact_tool = true

# Auto-approve tool calls (set to false for manual approval of sensitive operations)
# Tools requiring approval: execute, write_file, edit_file, web_search, task
auto_approve = false

# Show tool execution progress in bot mode (Telegram, Discord, Feishu, DingTalk)
# When enabled, users will see intermediate steps like "⏳ execute...", "⏳ read_file..."
# Note: This may generate multiple messages depending on the channel
# show_progress = false

# ==================== LLM Provider Configuration ====================
# DeepCoBot supports any OpenAI-compatible API. Configure your provider below.

# Anthropic configuration
[providers.anthropic]
api_key = "${ANTHROPIC_API_KEY}"
# api_base = "https://api.anthropic.com"  # Optional, custom API endpoint

# OpenAI configuration
[providers.openai]
api_key = "${OPENAI_API_KEY}"
# api_base = "https://api.openai.com/v1"  # Optional, custom API endpoint

# DeepSeek configuration (OpenAI-compatible)
# [providers.deepseek]
# api_key = "${DEEPSEEK_API_KEY}"
# api_base = "https://api.deepseek.com/v1"

# Moonshot (月之暗面) configuration (OpenAI-compatible)
# [providers.moonshot]
# api_key = "${MOONSHOT_API_KEY}"
# api_base = "https://api.moonshot.cn/v1"

# Zhipu (智谱) configuration (OpenAI-compatible)
# [providers.zhipu]
# api_key = "${ZHIPU_API_KEY}"
# api_base = "https://open.bigmodel.cn/api/paas/v4"

# Qwen (通义千问) configuration (OpenAI-compatible)
# [providers.qwen]
# api_key = "${QWEN_API_KEY}"
# api_base = "https://dashscope.aliyuncs.com/compatible-mode/v1"

# Local LLM via Ollama (OpenAI-compatible)
# [providers.ollama]
# api_key = "ollama"  # Ollama doesn't require a real API key
# api_base = "http://localhost:11434/v1"

# Other OpenAI-compatible providers (e.g., Together AI, Groq, SiliconFlow)
# [providers.together]
# api_key = "${TOGETHER_API_KEY}"
# api_base = "https://api.together.xyz/v1"

# ==================== Gateway Configuration (Optional) ====================
# For centralized API management, supports LangSmith tracing, etc.

[gateway]
enabled = false
# url = "https://your-gateway.example.com"
# api_key = "${GATEWAY_API_KEY}"

# ==================== Channel Configuration ====================

# CLI channel (enabled by default)
[channels.cli]
enabled = true

# Telegram channel
[channels.telegram]
enabled = false
token = "${TELEGRAM_BOT_TOKEN}"
# proxy = "http://127.0.0.1:7890"  # Optional, proxy settings
allowed_users = []  # Empty allows all users, or specify user_id or username

# Discord channel
[channels.discord]
enabled = false
token = "${DISCORD_BOT_TOKEN}"
allowed_users = []

# Feishu (Lark) channel
[channels.feishu]
enabled = false
app_id = "${FEISHU_APP_ID}"
app_secret = "${FEISHU_APP_SECRET}"
# encrypt_key = "${FEISHU_ENCRYPT_KEY}"  # Optional, message encryption key
# verification_token = "${FEISHU_VERIFICATION_TOKEN}"  # Optional
allowed_users = []

# DingTalk channel
[channels.dingtalk]
enabled = false
client_id = "${DINGTALK_CLIENT_ID}"
client_secret = "${DINGTALK_CLIENT_SECRET}"
allowed_users = []

# AI Card configuration for progress feedback (optional)
# Create a card template in DingTalk Open Platform to enable real-time progress display
# card_template_id = "your_card_template_id"
# card_template_key = "content"  # Content field key in the card template

# Web API channel
[channels.web]
enabled = false
host = "0.0.0.0"
port = 8080
# api_key = "${WEB_API_KEY}"  # Optional, API authentication key

# ==================== Async Sub-Agent Configuration ====================
# Configure async sub-agents connecting to remote LangGraph servers

# [[async_subagents]]
# name = "research-agent"
# description = "Async agent for deep research tasks"
# graph_id = "research_graph"
# url = "http://localhost:8123"

# [[async_subagents]]
# name = "code-review-agent"
# description = "Async agent for code review"
# graph_id = "code_review_graph"
# url = "http://localhost:8124"

# ==================== Cron Task Configuration ====================

[cron]
enabled = false
store_path = "~/.deepcobot/cron_jobs.json"

# Predefined task examples
# [[cron.jobs]]
# name = "daily-report"
# enabled = true
# schedule = "0 9 * * *"  # Every day at 9:00 (cron expression)
# message = "Please generate today's daily report"
# channel = "telegram"
# chat_id = "123456789"

# [[cron.jobs]]
# name = "hourly-check"
# enabled = true
# every = "1h"  # Execute every hour
# message = "Check system status"

# ==================== Heartbeat Configuration ====================
# Heartbeat periodically reads HEARTBEAT.md and triggers the agent to execute tasks
# Create ~/.deepcobot/workspace/HEARTBEAT.md with your periodic tasks

[heartbeat]
# Enable heartbeat service
enabled = false

# Execution interval: supports "30m", "1h", "2h30m", "90s"
every = "30m"

# Active hours: only execute during this time range (optional)
# Format: "HH:MM-HH:MM", uses system timezone
# active_hours = "09:00-18:00"

# Result dispatch target (optional):
# - "last": dispatch to last interaction channel (non-CLI)
# - "channel:chat_id": dispatch to specific channel, e.g., "telegram:123456789"
# - empty or not set: no dispatch (just execute silently)
# target = "last"

# Execution timeout (seconds)
timeout = 120

# ==================== Service Configuration ====================

[services]
# Health check endpoint
health_enabled = false
health_port = 8081

# Prometheus metrics endpoint
metrics_enabled = false
metrics_port = 9090

# ==================== Logging Configuration ====================

[logging]
# Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = "INFO"
# Output JSON format logs (suitable for production)
json_format = false
# Log file path (optional)
# file = "~/.deepcobot/deepcobot.log"

# ==================== LangSmith Configuration ====================
# Configure LangSmith for tracing and debugging your AI applications

[langsmith]
# Enable LangSmith tracing
enabled = false
# LangSmith API key (format: lsv2_pt_...)
# Get your API key from https://smith.langchain.com/settings
# api_key = "${LANGSMITH_API_KEY}"
# Project name (optional, defaults to "default")
# project = "my-project"

# ==================== Langfuse Configuration ====================
# Configure Langfuse for tracing and debugging your AI applications
# Langfuse is an open-source alternative to LangSmith

[langfuse]
# Enable Langfuse tracing
enabled = false
# Langfuse public key (format: pk-...)
# Get your keys from https://cloud.langfuse.com or your self-hosted instance
# public_key = "${LANGFUSE_PUBLIC_KEY}"
# Langfuse secret key (format: sk-...)
# secret_key = "${LANGFUSE_SECRET_KEY}"
# Langfuse base URL (optional, defaults to https://cloud.langfuse.com)
# For self-hosted: base_url = "https://langfuse.your-domain.com"
# base_url = "${LANGFUSE_BASE_URL}"
# Project name (optional)
# project = "my-project"

# ==================== MCP (Model Context Protocol) Configuration ====================
# Connect to MCP servers to extend Agent capabilities with external tools

# Example: Local filesystem MCP server (stdio transport)
# [mcp.servers.filesystem]
# type = "stdio"
# command = "npx"
# args = ["-y", "@anthropic/mcp-server-filesystem", "/tmp"]
# tool_timeout = 30
# enabled_tools = ["*"]  # "*" enables all tools, or specify tool names

# Example: Remote MCP server (SSE transport)
# [mcp.servers.remote-api]
# type = "sse"
# url = "https://api.example.com/mcp/sse"
# headers = { Authorization = "Bearer your-token" }
# tool_timeout = 60
# enabled_tools = ["search", "query"]  # Only enable specific tools

# Example: Remote MCP server (Streamable HTTP transport)
# [mcp.servers.data-service]
# type = "streamableHttp"
# url = "https://api.example.com/mcp"
# headers = { "X-API-Key" = "your-api-key" }
# tool_timeout = 30
# enabled_tools = ["*"]